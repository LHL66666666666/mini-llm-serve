run_name: unified_llama
out_root: experiments/training
notes: LLaMA 预设:RoPE + RMSNorm + SwiGLU,tying on
use_tensorboard: false
use_wandb: true
wandb_project: mini_LLM_inference_system
model:
  preset: llama
  max_seq_len: 256
  vocab_size: 50304
  n_layer: 4
  n_head: 4
  hidden_size: 256
  max_position_embeddings: 256
  dropout: 0.0
  bias: false
data:
  filepath: ''
  train_files:
    - D:/pytorch_llm_learning/neural_network_zero_to_hero/fineweb_edu_q3_20M.jsonl
    - D:/FineWeb-edu_data/pretrain_shard_00007.jsonl
  val_files: []
  val_shard_index: -1               # 从最后一个 shard 尾部切 val
  shuffle: false                    # 是否全局打乱
  tokenizer: gpt2         # 后续做 vocab 实验时改成自研 tokenizer.json 路径
  block_size: 256
  val_ratio: 0.05
  cache_dir: data/cache
  num_workers: 0
optim:
  lr: 0.0003
  min_lr: 3.0e-05
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 100
  lr_decay_steps: null    # null -> 自动 = max_steps
train:
  arch: unified
  micro_batch_size: 8
  global_batch_size: 32
  max_steps: null                 # 按照训练步数停止
  max_tokens: 200000          # 用 token 预算停止
  dtype: bfloat16
  device: auto
  seed: 42
  log_interval: 50
  val_interval: 100
  ckpt_interval: 500
  sample_interval: 500
  sample_prompts: [
    "Machine learning is",
    "The theory of evolution",
    "In mathematics,",
    "According to research,",
    "The history of",
    "Climate change is",
    "One important advantage of",
    "Recent studies suggest that",
  ]
  sample_max_new_tokens: 100
  sample_temperature: 1.0
  sample_top_k: 50